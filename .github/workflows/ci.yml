name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

# Cancel in-progress runs for the same branch/PR to avoid wasted resources.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege permissions — jobs may escalate individually if needed.
permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Test
      run: dotnet test --no-build --configuration Release --verbosity normal --logger trx --results-directory ./TestResults
      env:
        ProjectX__ApiKey: ${{ secrets.PROJECTX_API_KEY }}
        ProjectX__ApiSecret: ${{ secrets.PROJECTX_API_SECRET }}
      
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: ./TestResults/*.trx
