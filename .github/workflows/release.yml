name: Release NuGet Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g., 1.0.0)'
        required: true
        type: string

# Least-privilege permissions — jobs may escalate individually if needed.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------
  # Gate: pauses execution and requires manual approval from the
  # "production" environment's required reviewers before any
  # package is built or published.
  # ---------------------------------------------------------------
  gate:
    name: Await release approval
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - name: Release approved
        run: echo "Release approved — proceeding to build and publish."

  publish:
    name: Build and publish NuGet package
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Test
      run: dotnet test --no-build --configuration Release --verbosity normal
      env:
        ProjectX__ApiKey: ${{ secrets.PROJECTX_API_KEY }}
        ProjectX__ApiSecret: ${{ secrets.PROJECTX_API_SECRET }}
      
    - name: Determine version
      id: version
      run: |
        if [ "${{ github.event_name }}" == "release" ]; then
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
        else
          VERSION="${{ github.event.inputs.version }}"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        
    - name: Pack NuGet package
      run: dotnet pack MarqSpec.Client.ProjectX/MarqSpec.Client.ProjectX.csproj --no-build --configuration Release --output ./artifacts -p:PackageVersion=${{ steps.version.outputs.version }}
      
    - name: Push to NuGet.org
      run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
      
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nuget-package
        path: ./artifacts/*.nupkg
